# Quiet Feed — Microservices Architecture
# Copy .env.example to .env and fill it in, then:  docker compose up -d --build

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quietfeed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-quietfeed}
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quietfeed} -d ${POSTGRES_DB:-quietfeed}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    restart: unless-stopped
    expose:
      - "6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: quietfeed
      RABBITMQ_DEFAULT_PASS: quietfeed
    expose:
      - "5672"
      - "15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth_service:
    build:
      context: ./services/auth
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-quietfeed}:${POSTGRES_PASSWORD}@db:5432/quietfeed_auth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?set GOOGLE_CLIENT_ID in .env}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    expose:
      - "3001"

  content_service:
    build:
      context: ./services/content
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgres://${POSTGRES_USER:-quietfeed}:${POSTGRES_PASSWORD}@db:5432/quietfeed_content
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://quietfeed:quietfeed@rabbitmq:5672
    expose:
      - "3002"

  progress_service:
    build:
      context: ./services/progress
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: postgres://${POSTGRES_USER:-quietfeed}:${POSTGRES_PASSWORD}@db:5432/quietfeed_progress
    expose:
      - "3003"

  worker_service:
    build:
      context: ./services/worker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: production
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:?set YOUTUBE_API_KEY in .env}
      REFRESH_INTERVAL_MINUTES: ${REFRESH_INTERVAL_MINUTES:-30}
      RABBITMQ_URL: amqp://quietfeed:quietfeed@rabbitmq:5672

  gateway:
    image: nginx:alpine
    volumes:
      - ./services/gateway/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth_service
      - content_service
      - progress_service
    expose:
      - "3000"

  web:
    build:
      context: .
      dockerfile: source/Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    depends_on:
      - gateway
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  dbdata:
