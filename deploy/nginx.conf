events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Redirect all HTTP traffic to HTTPS
    server {
        listen 80;
        server_name quietfeed.devopspractice.live;

        return 301 https://$host$request_uri;
    }

    # Main HTTPS Server
    server {
        listen 443 ssl;
        server_name quietfeed.devopspractice.live;

        # SSL Certificates mapped from Let's Encrypt
        ssl_certificate /etc/letsencrypt/live/quietfeed.devopspractice.live/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/quietfeed.devopspractice.live/privkey.pem;

        # Recommended SSL Security Settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        root /usr/share/nginx/html;
        index index.html;

        # gzip text assets
        gzip on;
        gzip_types text/css application/javascript application/json image/svg+xml;
        gzip_min_length 1024;

        # API → backend service (same origin, so session cookies just work).
        location /api/ {
            proxy_pass http://server:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # Long-cache hashed build assets.
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # SPA fallback: every other path serves index.html.
        location / {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            try_files $uri $uri/ /index.html;
        }
    }
}
