events {
    worker_connections 1024;
}

http {
    upstream auth_service {
        server auth_service:3001;
    }

    upstream content_service {
        server content_service:3002;
    }

    upstream progress_service {
        server progress_service:3003;
    }

    server {
        listen 3000;

        # Add global proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location /api/auth {
            proxy_pass http://auth_service;
        }

        location /api/channels {
            proxy_pass http://content_service;
        }

        location /api/playlists {
            proxy_pass http://content_service;
        }

        location /api/videos {
            proxy_pass http://content_service;
        }

        location /api/progress {
            proxy_pass http://progress_service;
        }

        location /api/health {
            return 200 '{"ok": true, "service": "api-gateway"}';
            add_header Content-Type application/json;
        }

        # Catch-all
        location /api {
            return 404 '{"error": "Not found"}';
            add_header Content-Type application/json;
        }
    }
}
